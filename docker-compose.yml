version: '3.8'

services:

  # Target 1: Simple HTTP server (GUARANTEED to work)
  # This is the main target for DoS demos
  http_target:
    image: python:3.11-slim
    container_name: tf_http
    command: python -m http.server 80
    working_dir: /tmp
    networks:
      threatnet:
        ipv4_address: 172.25.0.13
    ports:
      - "8081:80"    # Access from Windows at localhost:8081
    restart: unless-stopped

  # Target 2: nginx (simple web server)
  nginx:
    image: nginx:alpine
    container_name: tf_nginx
    networks:
      threatnet:
        ipv4_address: 172.25.0.12
    ports:
      - "8082:80"    # Access from Windows at localhost:8082
    restart: unless-stopped

  # Target 3: DVWA
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: tf_dvwa
    networks:
      threatnet:
        ipv4_address: 172.25.0.10
    ports:
      - "8083:80"    # Access from Windows at localhost:8083
    restart: unless-stopped

networks:
  threatnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24
